version: "3.8"

services:
  # ──────────────────────────────────────────────────────────────────
  # FastAPI Application Service
  # ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notevault_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    # Memasang source code lokal ke container (live-reload saat dev)
    volumes:
      - .:/app
    # Menggunakan env file lokal
    env_file:
      - .env
    # Command ini menimpa CMD di Dockerfile agar reload otomatis aktif
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # Bergabung dengan network Supabase lokal
    networks:
      - supabase-network

# ──────────────────────────────────────────────────────────────────────
# PILIHAN NETWORKING
# ──────────────────────────────────────────────────────────────────────
# Karena kamu menggunakan Supabase CLI (`supabase start`), seluruh service
# database, kong, auth dll sudah hidup di network Docker tersendiri.
# Agar FastAPI bisa mengakses Supabase via internal URL Docker (http://kong:8000),
# container ini harus di-bridge ke network tersebut.
networks:
  supabase-network:
    name: supabase_network_note-vault-cicd
    external: true
