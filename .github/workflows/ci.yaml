name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Linting (flake8)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
          # Install from requirements if exists, but for linting we only need flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Flake8
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

  test:
    name: Testing (pytest)
    runs-on: ubuntu-latest
    needs: lint
    env:
      SUPABASE_URL: "https://placeholder.supabase.co"
      SUPABASE_KEY: "placeholder-key"
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx

      - name: Run Unit Tests
        run: |
          pytest test/unit_test.py -v

  build:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Manifest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # Clone the config repo
          git clone https://x-access-token:${CONFIG_REPO_TOKEN}@github.com/leecode83/notevault-config.git
          cd notevault-config
          
          # Get the short SHA (first 7 chars)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          
          # Update the image tag in dev deployment
          # Match 'image: ghcr.io/leecode83/notevault-api' then any tag after ':'
          sed -i "s|image: ghcr.io/leecode83/notevault-api:.*|image: ghcr.io/leecode83/notevault-api:sha-$SHORT_SHA|g" environments/dev/deployment.yaml
          
          git add .
          git commit -m "chore: update dev image to sha-$SHORT_SHA [skip ci]"
          git push
